version: '3.8'

services:
  api:
    build: .
    image: and-cp-platform:latest
    container_name: and-cp-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    command: python -m src.api.server
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  dashboard:
    image: and-cp-platform:latest
    container_name: and-cp-dashboard
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
